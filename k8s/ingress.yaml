apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"   # long-lived WebSockets
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: nexus.example.gov
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: nexus-api, port: { number: 80 } } }
          - path: /ws
            pathType: Prefix
            backend: { service: { name: nexus-api, port: { number: 80 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: nexus-frontend, port: { number: 80 } } }
