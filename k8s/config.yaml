apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-config
  namespace: nexus
data:
  NEXUS_ENV: "production"
  NEXUS_LLM_PROVIDER: "openai"
  NEXUS_LLM_MODEL: "gpt-5.5"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus
type: Opaque
stringData:
  # populate via CI secret store / sealed-secrets — never commit real values
  NEXUS_JWT_SECRET: "REPLACE_ME"
  NEXUS_DATABASE_URL: "postgresql+asyncpg://nexus:REPLACE@nexus-db:5432/nexus"
  NEXUS_REDIS_URL: "redis://nexus-redis:6379/0"
  NEXUS_OPENAI_API_KEY: "REPLACE_ME"
