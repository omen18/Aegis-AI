apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api
  namespace: nexus
  labels: { app: nexus-api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: nexus-api }
  template:
    metadata:
      labels: { app: nexus-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/nexus-api:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: nexus-config }
            - secretRef: { name: nexus-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-api
  namespace: nexus
spec:
  selector: { app: nexus-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-api-hpa
  namespace: nexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
